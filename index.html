<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Veronica 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(to bottom right, #ffe0e6, #ffb3c1, #ffffff);
}

.container {
  text-align:center;
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  box-shadow:0 0 25px rgba(0,0,0,0.2);
}

h1 {
  color:#ff4d6d;
  font-size:2rem;
}

#question {
  margin:20px 0;
  font-size:1.2rem;
  color:#6a0dad;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

#yesBtn { background:#ff4d6d; color:white; }
#noBtn { background:#6a0dad; color:white; position:fixed; transition: all 0.3s ease; }

.emoji {
  position:absolute;
  font-size:2rem;
  animation:float 2s linear forwards;
}

@keyframes float{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-150px)}
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  color:#ff4d6d;
  font-weight:bold;
}

/* Mobile responsiveness */
@media(max-width:500px){
  .container{width:95%; padding:20px;}
  #question{font-size:1rem;}
  h1{font-size:1.5rem;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Hi Veronica 💖</h1>
  <div id="question">Do you love me?</div>

  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>

  <div id="message"></div>
</div>

<footer>© 2026 All copies reserved</footer>

<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script>
// Romantic questions
const questions = [
"Do you love me?",
"Will you stay with me forever?",
"Do you miss me?",
"Do you want to travel with me?",
"Will you hold my hand always?",
"Do you think about me?",
"Do you like my smile?",
"Will you laugh with me?",
"Do you want to build life together?",
"Will you support me?",
"Do you enjoy my company?",
"Will you be my happiness?",
"Do you want adventures together?",
"Will you trust me always?",
"Do you want endless love?",
"Will you share dreams with me?",
"Do you love our moments?",
"Will you stay loyal?",
"Do you want forever with me?",
"Will you marry me? 💍"
];

// NO button texts
const noTexts = [
"Hey 😡 stop that!",
"No is not allowed!",
"Try again 😢",
"Don't do that!",
"You can't escape!",
"Only YES works!",
"Not possible 😡",
"Come on 😏"
];

let index=0;

const question=document.getElementById("question");
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const message=document.getElementById("message");

// YES reactions 💖
function yesReaction(){
  const emojis=["😍","🥰","😘","💖","💕","🤗","😄"];
  for(let i=0;i<5;i++){
    let e=document.createElement("div");
    e.className="emoji";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.top=Math.random()*100+"vh";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);
  }
}

// YES click
yesBtn.onclick=()=>{
  yesReaction();
  index++;

  if(index<questions.length){
    question.innerText=questions[index];
  }else{
    document.body.innerHTML=`
    <div style="text-align:center;padding:30px">
      <h2>💖 Thank you Veronica 💖</h2>
      <p>I, Veronica, agree to marry Jamal Hassan ❤️</p>
      <p>Let's begin our forever together 💍</p>
      <footer style="color:#ff4d6d">© 2026 All copies reserved</footer>
    </div>`;
  }
}

// NO button chaos 😈
let moving=false;

function moveNoButton(){
  const x=Math.random()*(window.innerWidth-80);
  const y=Math.random()*(window.innerHeight-50);
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}

function chaosMove(){
  if(moving){
    moveNoButton();
    setTimeout(chaosMove,500); // slower movement
  }
}

noBtn.onclick=()=>{
  moving=true;
  chaosMove();

  document.getElementById("noSound").play();

  message.innerText=noTexts[Math.floor(Math.random()*noTexts.length)];

  // angry emojis
  for(let i=0;i<3;i++){
    let e=document.createElement("div");
    e.className="emoji";
    e.innerText=Math.random()>0.5?"😡":"😢";
    e.style.left=Math.random()*100+"vw";
    e.style.top=Math.random()*100+"vh";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);
  }
};
</script>
</body>
</html>
