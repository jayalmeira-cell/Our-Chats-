<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Veronica 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
  overflow:hidden;
  text-align:center;
}

.container{
  margin-top:80px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

#yesBtn{background:#ff4d6d;color:white;}
#noBtn{
  background:#6a0dad;
  color:white;
  position:fixed;
}

.emoji{
  position:absolute;
  font-size:2rem;
  animation:float 2s linear forwards;
}

@keyframes float{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-150px)}
}

canvas{
  border:2px solid #ff4d6d;
  margin-top:20px;
  background:white;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  color:#ff4d6d;
}
</style>
</head>

<body>

<div class="container">
<h1>Hi Veronica 💖</h1>
<h2 id="question">Do you love me?</h2>

<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>

<div id="message"></div>
</div>

<footer>© 2026 All copies reserved</footer>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<audio id="heartbeat" loop>
<source src="https://www.soundjay.com/human/heartbeat-01a.mp3">
</audio>

<audio id="yesSound" src="https://www.soundjay.com/human/applause-8.mp3"></audio>
<audio id="popSound" src="https://www.soundjay.com/button/beep-09.mp3"></audio>
<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script>

const questions=[
"Do you love me?",
"Will you stay with me forever?",
"Do you miss me?",
"Do you want to travel with me?",
"Will you hold my hand always?",
"Do you think about me?",
"Do you like my smile?",
"Will you laugh with me?",
"Do you want life together?",
"Will you support me?",
"Do you enjoy my company?",
"Will you be my happiness?",
"Do you want adventures?",
"Will you trust me?",
"Do you want endless love?",
"Will you share dreams?",
"Do you love our moments?",
"Will you stay loyal?",
"Do you want forever?",
"Will you marry me? 💍"
];

let i=0;

const q=document.getElementById("question");
const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const msg=document.getElementById("message");

document.body.onclick=()=>{
document.getElementById("bgMusic").play();
document.getElementById("heartbeat").play();
};

function emojiBlast(type){
let arr= type==="love"?["😍","💖","😘","🥰"]:["😡","😢"];
for(let j=0;j<8;j++){
let e=document.createElement("div");
e.className="emoji";
e.innerText=arr[Math.floor(Math.random()*arr.length)];
e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";
document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
document.getElementById("popSound").play();
}
}

yes.onclick=()=>{
emojiBlast("love");
document.getElementById("yesSound").play();

i++;
if(i<questions.length){
q.innerText=questions[i];
}else{
finalPage();
}
};

// CHAOS NO BUTTON
let moving=false;

function move(){
if(moving){
no.style.left=Math.random()*window.innerWidth+"px";
no.style.top=Math.random()*window.innerHeight+"px";
setTimeout(move,200);
}
}

no.onclick=()=>{
moving=true;
move();
emojiBlast("angry");
document.getElementById("noSound").play();

msg.innerText="No is not allowed 😈";
};

// FINAL PAGE
function finalPage(){
document.body.innerHTML=`
<h1>💍 MARRIAGE CONTRACT 💍</h1>
<p>I, Veronica, agree to marry Jamal Hassan ❤️</p>
<p>Forever and always 💖</p>

<canvas id="sign" width="300" height="150"></canvas>
<br>
<button onclick="alert('Signature Saved ❤️')">Submit Signature</button>

<h2 style="color:#ff4d6d;">I LOVE YOU SO MUCH 💖</h2>

<footer>© 2026 All copies reserved</footer>
`;

startConfetti();
setupCanvas();
}

// CONFETTI
function startConfetti(){
for(let k=0;k<100;k++){
let c=document.createElement("div");
c.className="emoji";
c.innerText="🎉";
c.style.left=Math.random()*100+"vw";
c.style.top=Math.random()*100+"vh";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

// SIGNATURE PAD
function setupCanvas(){
const canvas=document.getElementById("sign");
const ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=(e)=>{
if(!drawing)return;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.strokeStyle="#000";
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
};
}

</script>

</body>
</html>
