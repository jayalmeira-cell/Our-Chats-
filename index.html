<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veronica's Romantic Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0b;
  --purple:#8a2be2;
  --lightblue:#00dfff;
  --white:#ffffff;
}
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background:url('https://images.unsplash.com/photo-1601979109536-dfb5d1f1c0a1?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5NjIzMTR8MHwxfGFsbHwxfHxzaGFya2VkJTIwY2llbGV8ZW58MHx8fHwxNjgxOTM4NjYx&ixlib=rb-4.0.3&q=80&w=1080') no-repeat center center fixed;
  background-size:cover;
  color:var(--white);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}
#quizContainer{
  background: rgba(0,0,0,0.75);
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:500px;
  text-align:center;
  position:relative;
}
h1{
  font-size:2.2rem;
  margin-bottom:10px;
  color:var(--purple);
}
h2{
  font-size:1.4rem;
  margin-bottom:15px;
  color:var(--lightblue);
}
#question{
  font-size:1.2rem;
  margin:20px 0;
  min-height:40px;
}
button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}
#yesBtn{
  background:var(--purple);
  color:var(--white);
}
#yesBtn:hover{
  background:var(--lightblue);
}
#noBtn{
  background:red;
  color:white;
  position:absolute;
}
#message{
  margin-top:15px;
  font-size:1rem;
  min-height:20px;
}
.finalAgreement{
  display:none;
  margin-top:20px;
  background:rgba(255,192,203,0.2);
  padding:15px;
  border-radius:10px;
  color:var(--white);
}
#signature{
  font-weight:bold;
  margin-top:10px;
}
.emoji{
  position:absolute;
  font-size:2rem;
  pointer-events:none;
  animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
  0%{opacity:1; transform:translateY(0px);}
  100%{opacity:0; transform:translateY(-100px);}
}
</style>
</head>
<body>

<div id="quizContainer">
  <h1>WELCOME VERONICA</h1>
  <h2>Are you ready for a surprise?</h2>
  <div id="question">Do you love me, sweetie?</div>
  <div>
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>
  <div id="message"></div>

  <div class="finalAgreement" id="agreement">
    <p>Thank you for accepting this marriage! 💖</p>
    <p>Marriage Agreement:</p>
    <p>"I agreed to be married to Jamal Hassan with full love, respect, and commitment."</p>
    <div id="signature">Signed: Jamal Hassan</div>
    <p style="margin-top:10px; color:#ff1493;">© 2026 All copies reserved.</p>
  </div>
</div>

<audio id="yesSound" src="https://www.soundjay.com/human/cheer-01.mp3"></audio>
<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script>
const questions = [
  "Do you love me, sweetie?",
  "Will you hold my hand forever?",
  "Do you like my smile?",
  "Do you miss me when I'm away?",
  "Do you want to travel with me?",
  "Will you share your dreams with me?",
  "Do you think about me at night?",
  "Do you want to go on adventures together?",
  "Will you be my partner in crime?",
  "Do you want to spend every birthday with me?",
  "Will you cuddle with me every night?",
  "Do you want to dance with me in the rain?",
  "Will you send me good morning messages always?",
  "Do you want to watch sunsets together forever?",
  "Will you laugh at my silly jokes forever?",
  "Do you want to celebrate every small victory with me?",
  "Will you always forgive me when I’m wrong?",
  "Do you want to build a cozy home together?",
  "Will you support my dreams as I support yours?",
  "Will you marry me? 💍"
];

const noSentences = [
  "Hey! Don't do that 😡",
  "No way! 😢",
  "You can't click No here!",
  "Try harder! 😡",
  "Hmm… No isn't allowed!",
  "Oops! That No escaped!",
  "No… it ran away!",
  "Not possible!",
  "I told you, only Yes!",
  "Angry emoji says hi 😡",
  "Stop it! 😢",
  "Nooo! 😡",
  "Careful! 😢",
  "I won't let you click that!",
  "Only Yes counts!"
];

let current = 0;
const questionEl = document.getElementById("question");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const messageEl = document.getElementById("message");
const agreement = document.getElementById("agreement");
const container = document.getElementById("quizContainer");

function nextQuestion(){
  if(current<questions.length-1){
    current++;
    questionEl.innerText = questions[current];
    messageEl.innerText = "";
    resetNoPosition();
    playSound('yes');
  } else {
    questionEl.style.display="none";
    yesBtn.style.display="none";
    noBtn.style.display="none";
    agreement.style.display="block";
    playSound('yes');
  }
}

yesBtn.addEventListener('click', nextQuestion);

function randomPosition(){
  const x = Math.random()*(container.offsetWidth - noBtn.offsetWidth);
  const y = Math.random()*(container.offsetHeight - noBtn.offsetHeight);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  showEmoji();
  playSound('no');
}

function resetNoPosition(){
  noBtn.style.left = "calc(50% + 50px)";
  noBtn.style.top = "0";
}

noBtn.addEventListener('mouseenter', ()=>{
  randomPosition();
  const msgIndex = Math.floor(Math.random()*noSentences.length);
  messageEl.innerText = noSentences[msgIndex];
});

// Floating emojis
function showEmoji(){
  const emoji = document.createElement('div');
  emoji.className = 'emoji';
  const types = ['😡','😢'];
  emoji.innerText = types[Math.floor(Math.random()*types.length)];
  emoji.style.left = (Math.random()*80) + "%";
  emoji.style.top = (Math.random()*80) + "%";
  document.body.appendChild(emoji);
  setTimeout(()=>{emoji.remove();},2000);
}

// Sounds
function playSound(type){
  if(type==='yes'){
    document.getElementById('yesSound').play();
  } else if(type==='no'){
    document.getElementById('noSound').play();
  }
}
</script>

</body>
  </html>
