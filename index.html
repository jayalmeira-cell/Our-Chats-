<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Veronica 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* Base Styles */
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(to bottom,#ffdde1,#ee9ca7);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

.container{
  text-align:center;
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  position:relative;
}

h1{
  color:#ff4d6d;
  font-size:2rem;
}

#question{
  margin:20px 0;
  font-size:1.2rem;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

#yesBtn{background:#ff4d6d;color:white;z-index:10;}
#noBtn{
  background:#6a0dad;
  color:white;
  position:fixed;
  z-index:10;
}

.emoji{
  position:absolute;
  font-size:2rem;
  animation:float 2s linear forwards;
}

@keyframes float{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-150px);}
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  color:#ff4d6d;
}

/* Signature Canvas */
#signatureCanvas{
  border:2px solid #ff4d6d;
  border-radius:10px;
  width:90%;
  max-width:400px;
  height:150px;
  margin-top:10px;
  touch-action:none;
}
#initialsInput{
  font-size:1.2rem; 
  text-align:center; 
  margin-bottom:10px;
  width:90%;
  max-width:400px;
  padding:5px;
  border:2px solid #ff4d6d;
  border-radius:10px;
}
#saveBtn{
  margin-top:10px; 
  padding:10px 20px; 
  border:none; 
  border-radius:10px; 
  background:#ff4d6d; 
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
  <h1>Hi Veronica 💖</h1>
  <div id="question">Do you love me?</div>

  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>

  <div id="message"></div>
</div>

<footer>© 2026 All copies reserved</footer>

<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>
<audio id="yesSound" src="https://www.soundjay.com/button/button-09.mp3"></audio>

<script>
// Questions (30)
const questions = [
"Do you love me?","Will you stay with me forever?","Do you miss me?",
"Do you want to travel with me?","Will you hold my hand always?","Do you think about me?",
"Do you like my smile?","Will you laugh with me?","Do you want to build life together?",
"Will you support me?","Do you enjoy my company?","Will you be my happiness?",
"Do you want adventures together?","Will you trust me always?","Do you want endless love?",
"Will you share dreams with me?","Do you love our moments?","Will you stay loyal?",
"Do you want forever with me?","Will you marry me? 💍","Do you want a cozy night together?",
"Do you like my surprises?","Will you go to movies with me?","Do you want a picnic with me?",
"Do you like my hugs?","Do you enjoy our talks?","Will you dance with me?",
"Do you want to watch stars together?","Do you like my cooking?","Will you be my partner in crime?"
];

// No Texts (30)
const noTexts = [
"Hey 😡 stop that!","No is not allowed!","Try again 😢","Don't do that!","You can't escape!",
"Only YES works!","Not possible 😡","Come on 😏","Why are you like this?","You are going nowhere!",
"You belong to me!","Nope 😠","Don't touch me!","Try harder!","Can't do it!",
"Impossible!","Seriously? 😡","Stop it now!","You can't resist!","I said YES!",
"LOL 😆","Just accept it!","Run all you want 😤","You can't hide!","Don't even try!",
"Think again 😢","You know it's YES!","Funny NO 😏","Still NO 😡","Give in already!"
];

let index=0;
const question=document.getElementById("question");
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const message=document.getElementById("message");
const noSound=document.getElementById("noSound");
const yesSound=document.getElementById("yesSound");

// YES reaction
function yesReaction(){
  const emojis=["😍","🥰","😘","💖","💕","🤗","😄"];
  for(let i=0;i<5;i++){
    let e=document.createElement("div");
    e.className="emoji";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.top=Math.random()*100+"vh";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);
  }
}

// Yes Button
yesBtn.onclick=()=>{
  yesSound.play();
  yesReaction();
  index++;
  if(index<questions.length){
    question.innerText=questions[index];
  }else{
    document.body.innerHTML=`
    <div style="text-align:center;padding:30px">
      <h2>💖 Thank you Veronica 💖</h2>
      <p>I, Veronica, agree to marry Jamal Hassan ❤️</p>
      <p>Sign or type your initials below:</p>
      <input type="text" id="initialsInput" placeholder="Type your initials">
      <canvas id="signatureCanvas"></canvas>
      <button id="saveBtn">Save Signature</button>
      <p>All copies reserved</p>
    </div>`;

    // Signature Drawing & Typing
    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    const initialsInput = document.getElementById("initialsInput");
    const saveBtn = document.getElementById("saveBtn");
    let drawing = false;

    // Mouse / Touch Drawing
    canvas.addEventListener("mousedown",()=>drawing=true);
    canvas.addEventListener("mouseup",()=>drawing=false);
    canvas.addEventListener("mouseleave",()=>drawing=false);
    canvas.addEventListener("mousemove",(e)=>{
      if(!drawing) return;
      const rect = canvas.getBoundingClientRect();
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#ff4d6d";
      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    // Touch support
    canvas.addEventListener("touchstart", e => { e.preventDefault(); drawing = true; });
    canvas.addEventListener("touchend", e => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if(!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#ff4d6d";
      ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    // Type initials to canvas
    initialsInput.addEventListener("input", ()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.font = "40px 'Poppins', sans-serif";
      ctx.fillStyle = "#ff4d6d";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(initialsInput.value, canvas.width/2, canvas.height/2);
    });

    // Save signature
    saveBtn.addEventListener("click", ()=>{
      const dataURL = canvas.toDataURL();
      alert("Signature saved!"); 
      console.log(dataURL);
    });
  }
}

// NO Button movement & chaos
let moving=false;
function moveNoButton(){
  const x=Math.random()*(window.innerWidth-80);
  const y=Math.random()*(window.innerHeight-50);
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}
function chaosMove(){
  if(moving){
    moveNoButton();
    setTimeout(chaosMove,700);
  }
}
noBtn.onclick=()=>{
  moving=true;
  chaosMove();
  noSound.play();
  message.innerText=noTexts[Math.floor(Math.random()*noTexts.length)];

  // Angry/Sad emojis
  for(let i=0;i<3;i++){
    let e=document.createElement("div");
    e.className="emoji";
    e.innerText=Math.random()>0.5?"😡":"😢";
    e.style.left=Math.random()*100+"vw";
    e.style.top=Math.random()*100+"vh";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);
  }

  // Not text disappears after 1.5s
  setTimeout(()=>{message.innerText="";},1500);
}

// Disable text selection / Google search popup
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("selectstart", e=>e.preventDefault());
document.addEventListener("touchstart", e=>{
  if(e.target.id!=="yesBtn" && e.target.id!=="noBtn"){e.preventDefault();}
},{passive:false});
</script>
</body>
</html>
